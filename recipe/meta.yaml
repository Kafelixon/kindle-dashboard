{% set name = "kindle-dashboard-renderer" %}
{% set version = "0.1.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/Kafelixon/kindle-dashboard/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 0419e387e853bf0a9f37ca2125eb18d13d7252348f8b922c2b92d433c8bf5ce1

build:
  number: 0
  entry_points:
    - kindle-dashboard = kindle_dashboard.app:main

requirements:
  build:
    - {{ compiler('cxx') }}
    - cmake
    - ninja
  host:
    - python
    - pybind11
    - pip
  run:
    - python
    - fastapi
    - httpx
    - pillow
    - uvicorn

test:
  imports:
    - kindle_dashboard
    - kindle_dashboard._dither
  commands:
    - kindle-dashboard --help

about:
  home: https://github.com/Kafelixon/kindle-dashboard
  summary: API-backed Kindle dashboard renderer with pybind11 dithering.
